<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVR Calendar - BETA</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="pagina-container">
    
    <div class="calendario-secao">
      
      <div class="navegacao-calendario">
        <select id="select-mes" class="dropdown-nav">
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4" selected>May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
        <select id="select-ano" class="dropdown-nav"></select>
      </div>
      
      <div class="grid-calendario">
        <div class="dia-semana header">Sunday</div>
        <div class="dia-semana header">Monday</div>
        <div class="dia-semana header">Tuesday</div>
        <div class="dia-semana header">Wednesday</div>
        <div class="dia-semana header">Thursday</div>
        <div class="dia-semana header">Friday</div>
        <div class="dia-semana header">Saturday</div>
        <div id="container-dias" style="display: contents;"></div>
      </div>

      <div class="grafico-container" style="margin-top: 40px; background: white; padding: 15px; border: 2px solid #000;">
        <h3 style="margin-top: 0; font-family: Arial, sans-serif;">CONVECTIVE OUTLOOK TREND (MAX/DAY)</h3>
        <canvas id="graficoTendencia"></canvas>
      </div>

    </div>

    <div class="legenda-secao">
      <div class="potencial-lista">
        <div class="item-potencial">
          <img src="https://cdn-icons-png.flaticon.com/512/12446/12446252.png" class="icone-temp baixo" alt="Granizo Baixo">
          <img src="https://cdn-icons-png.flaticon.com/512/12446/12446252.png" class="icone-temp alto" alt="Granizo Alto">
          <strong>HAIL</strong> Potential
        </div>
        <div class="item-potencial">
          <img src="https://cdn-icons-png.flaticon.com/512/6421/6421009.png" class="icone-temp baixo" alt="Tornado Baixo">
          <img src="https://cdn-icons-png.flaticon.com/512/6421/6421009.png" class="icone-temp alto" alt="Tornado Alto">
          <strong>TOR</strong> Potential
        </div>
        <div class="item-potencial">
          <img src="https://cdn-icons-png.flaticon.com/512/564/564619.png" class="icone-svr" alt="SVR">
          <strong>SVR</strong> Potential
        </div>
      </div>

      <div class="tabela-severidade">
        <h2>NÍVEL DE SEVERIDADE</h2>
        <div class="linha-severidade"><span class="quadradinho-cor temp-verde"></span> Tempestades</div>
        <div class="linha-severidade"><span class="quadradinho-cor nivel-1"></span> Nível 1</div>
        <div class="linha-severidade"><span class="quadradinho-cor nivel-2"></span> Nível 2</div>
        <div class="linha-severidade"><span class="quadradinho-cor nivel-3-forte"></span> Nível 3</div>
        <div class="linha-severidade"><span class="quadradinho-cor nivel-4"></span> Nível 4</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
